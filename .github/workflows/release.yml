name: Release

# Stage 1 (workflow_dispatch): calculates versions, creates a release branch,
#   commits version/changelog bumps, and opens a PR targeting master.
#   No direct push to master occurs.
#
# Stage 2 (push to master): triggered automatically when the release PR is merged.
#   Detects a release commit by the "chore(release):" prefix, then:
#   - creates git tags,
#   - publishes plugins to their respective marketplaces, and
#   - creates GitHub Releases.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        type: choice
        options:
          - both
          - jetbrains
          - vscode
        default: both
      publish_jetbrains:
        description: "Publish to JetBrains Marketplace on merge"
        type: boolean
        default: true
      publish_vscode:
        description: "Publish to VS Code / OpenVSX Marketplaces on merge"
        type: boolean
        default: true
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

jobs:

  # ── Stage 1: Create a release PR (workflow_dispatch only) ───────────────────

  prepare_release:
    name: Prepare Release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      jetbrains_version: ${{ steps.jetbrains_version.outputs.version }}
      vscode_version: ${{ steps.vscode_version.outputs.version }}
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Calculate JetBrains Version
        if: inputs.target == 'jetbrains' || inputs.target == 'both'
        id: jetbrains_version
        run: |
          LAST_TAG=$(git tag -l "jetbrains-v*" | sort -V | tail -1)
          CURRENT_VERSION=$(grep 'pluginVersion' jetbrains/gradle.properties | cut -d'=' -f2 | tr -d ' ')

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline "$LAST_TAG"..HEAD -- jetbrains/ || echo "")
          else
            COMMITS=$(git log --oneline -50 -- jetbrains/ || echo "")
          fi

          INCREMENT="patch"
          if echo "$COMMITS" | grep -qiE "breaking.change|[a-z]+!:"; then
            INCREMENT="major"
          elif echo "$COMMITS" | grep -qE "feat[:(]"; then
            INCREMENT="minor"
          fi

          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          case $INCREMENT in
            major) NEW_VERSION="$((major + 1)).0.0" ;;
            minor) NEW_VERSION="$major.$((minor + 1)).0" ;;
            patch) NEW_VERSION="$major.$minor.$((patch + 1))" ;;
          esac

          if git tag -l "jetbrains-v$NEW_VERSION" | grep -q "^jetbrains-v$NEW_VERSION$"; then
            echo "Error: Tag jetbrains-v$NEW_VERSION already exists"
            exit 1
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "JetBrains version: $NEW_VERSION (from $CURRENT_VERSION, increment: $INCREMENT)"

      - name: Calculate VS Code Version
        if: inputs.target == 'vscode' || inputs.target == 'both'
        id: vscode_version
        run: |
          LAST_TAG=$(git tag -l "vscode-v*" | sort -V | tail -1)
          CURRENT_VERSION=$(node -p "require('./vscode/package.json').version")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline "$LAST_TAG"..HEAD -- vscode/ || echo "")
          else
            COMMITS=$(git log --oneline -50 -- vscode/ || echo "")
          fi

          INCREMENT="patch"
          if echo "$COMMITS" | grep -qiE "breaking.change|[a-z]+!:"; then
            INCREMENT="major"
          elif echo "$COMMITS" | grep -qE "feat[:(]"; then
            INCREMENT="minor"
          fi

          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          case $INCREMENT in
            major) NEW_VERSION="$((major + 1)).0.0" ;;
            minor) NEW_VERSION="$major.$((minor + 1)).0" ;;
            patch) NEW_VERSION="$major.$minor.$((patch + 1))" ;;
          esac

          if git tag -l "vscode-v$NEW_VERSION" | grep -q "^vscode-v$NEW_VERSION$"; then
            echo "Error: Tag vscode-v$NEW_VERSION already exists"
            exit 1
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "VS Code version: $NEW_VERSION (from $CURRENT_VERSION, increment: $INCREMENT)"

      - name: Compute Release Branch Name
        id: branch
        run: |
          BRANCH="chore/release"
          if [ "${{ inputs.target }}" = "jetbrains" ] || [ "${{ inputs.target }}" = "both" ]; then
            BRANCH="${BRANCH}-jetbrains-v${{ steps.jetbrains_version.outputs.version }}"
          fi
          if [ "${{ inputs.target }}" = "vscode" ] || [ "${{ inputs.target }}" = "both" ]; then
            BRANCH="${BRANCH}-vscode-v${{ steps.vscode_version.outputs.version }}"
          fi
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Check for Existing Release PR
        id: existing_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base master --head "${{ steps.branch.outputs.name }}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch ${{ steps.branch.outputs.name }}, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release Branch
        if: steps.existing_pr.outputs.skip != 'true'
        run: git checkout -b "${{ steps.branch.outputs.name }}"

      - name: Update JetBrains Version
        if: steps.existing_pr.outputs.skip != 'true' && (inputs.target == 'jetbrains' || inputs.target == 'both')
        run: |
          VERSION="${{ steps.jetbrains_version.outputs.version }}"
          sed -i "s/pluginVersion = .*/pluginVersion = $VERSION/" jetbrains/gradle.properties

      - name: Update VS Code Version
        if: steps.existing_pr.outputs.skip != 'true' && (inputs.target == 'vscode' || inputs.target == 'both')
        run: |
          VERSION="${{ steps.vscode_version.outputs.version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" vscode/package.json

      - name: Update JetBrains Changelog
        if: steps.existing_pr.outputs.skip != 'true' && (inputs.target == 'jetbrains' || inputs.target == 'both')
        run: |
          VERSION="${{ steps.jetbrains_version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          LAST_TAG=$(git tag -l "jetbrains-v*" | sort -V | tail -1)

          if [ -n "$LAST_TAG" ]; then
            git log --format="- %s" "$LAST_TAG"..HEAD -- jetbrains/ > /tmp/jb_entries.txt
          else
            git log --format="- %s" -50 -- jetbrains/ > /tmp/jb_entries.txt
          fi

          if [ ! -s /tmp/jb_entries.txt ]; then
            echo "- chore: release $VERSION" > /tmp/jb_entries.txt
          fi

          printf "\n## [%s] - %s\n\n" "$VERSION" "$DATE" > /tmp/jb_section.txt
          cat /tmp/jb_entries.txt >> /tmp/jb_section.txt
          printf "\n" >> /tmp/jb_section.txt

          sed -i "/^## \[Unreleased\]/r /tmp/jb_section.txt" jetbrains/CHANGELOG.md

          REPO="stanleygomes/codex-notes"
          if [ -n "$LAST_TAG" ]; then
            VERSION_LINK="[$VERSION]: https://github.com/$REPO/compare/$LAST_TAG...jetbrains-v$VERSION"
          else
            VERSION_LINK="[$VERSION]: https://github.com/$REPO/commits/jetbrains-v$VERSION"
          fi

          sed -i "s|^\[Unreleased\]:.*|\[Unreleased\]: https://github.com/$REPO/compare/jetbrains-v$VERSION...HEAD\n$VERSION_LINK|" jetbrains/CHANGELOG.md

      - name: Update VS Code Changelog
        if: steps.existing_pr.outputs.skip != 'true' && (inputs.target == 'vscode' || inputs.target == 'both')
        run: |
          VERSION="${{ steps.vscode_version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          LAST_TAG=$(git tag -l "vscode-v*" | sort -V | tail -1)

          if [ -n "$LAST_TAG" ]; then
            git log --format="- %s" "$LAST_TAG"..HEAD -- vscode/ > /tmp/vs_entries.txt
          else
            git log --format="- %s" -50 -- vscode/ > /tmp/vs_entries.txt
          fi

          if [ ! -s /tmp/vs_entries.txt ]; then
            echo "- chore: release $VERSION" > /tmp/vs_entries.txt
          fi

          printf "\n## [%s] - %s\n\n" "$VERSION" "$DATE" > /tmp/vs_section.txt
          cat /tmp/vs_entries.txt >> /tmp/vs_section.txt
          printf "\n" >> /tmp/vs_section.txt

          sed -i "/^## \[Unreleased\]/r /tmp/vs_section.txt" vscode/CHANGELOG.md

      - name: Commit and Push Release Branch
        if: steps.existing_pr.outputs.skip != 'true'
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MSG="chore(release):"
            if [ "${{ inputs.target }}" = "jetbrains" ] || [ "${{ inputs.target }}" = "both" ]; then
              MSG="$MSG jetbrains-v${{ steps.jetbrains_version.outputs.version }}"
            fi
            if [ "${{ inputs.target }}" = "vscode" ] || [ "${{ inputs.target }}" = "both" ]; then
              MSG="$MSG vscode-v${{ steps.vscode_version.outputs.version }}"
            fi
            git commit -m "$MSG"
            git push origin "${{ steps.branch.outputs.name }}"
          fi

      - name: Open Pull Request
        if: steps.existing_pr.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="chore(release):"
          if [ "${{ inputs.target }}" = "jetbrains" ] || [ "${{ inputs.target }}" = "both" ]; then
            TITLE="$TITLE jetbrains-v${{ steps.jetbrains_version.outputs.version }}"
          fi
          if [ "${{ inputs.target }}" = "vscode" ] || [ "${{ inputs.target }}" = "both" ]; then
            TITLE="$TITLE vscode-v${{ steps.vscode_version.outputs.version }}"
          fi

          gh pr create \
            --base master \
            --head "${{ steps.branch.outputs.name }}" \
            --title "$TITLE" \
            --body "Automated release PR. Merge to trigger git tag creation, marketplace publishing, and GitHub Release creation."

  # ── Stage 2: Tag, publish, and release (push to master after PR merge) ──────

  create_tags:
    name: Create Release Tags
    if: |
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Create JetBrains Tag
        if: contains(github.event.head_commit.message, 'jetbrains-v')
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'jetbrains-v\K[\d.]+')
          if [ -z "$VERSION" ]; then
            echo "Error: could not extract JetBrains version from commit message"
            exit 1
          fi
          git tag "jetbrains-v$VERSION"
          git push origin "jetbrains-v$VERSION"

      - name: Create VS Code Tag
        if: contains(github.event.head_commit.message, 'vscode-v')
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'vscode-v\K[\d.]+')
          if [ -z "$VERSION" ]; then
            echo "Error: could not extract VS Code version from commit message"
            exit 1
          fi
          git tag "vscode-v$VERSION"
          git push origin "vscode-v$VERSION"

  publish_jetbrains:
    name: Publish JetBrains Plugin
    needs: create_tags
    if: |
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore(release):') &&
      contains(github.event.head_commit.message, 'jetbrains-v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    defaults:
      run:
        working-directory: jetbrains
    steps:

      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Publish Plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: jetbrains/build/distributions/*.zip

  publish_vscode:
    name: Publish VS Code Extension
    needs: create_tags
    if: |
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore(release):') &&
      contains(github.event.head_commit.message, 'vscode-v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    defaults:
      run:
        working-directory: vscode
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Package VSIX
        run: npx @vscode/vsce package --no-yarn --out codex-notes.vsix

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.MARKETPLACE_VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath codex-notes.vsix --no-yarn

      - name: Publish to OpenVSX Marketplace
        env:
          OVSX_PAT: ${{ secrets.MARKETPLACE_OVSX_PAT }}
        run: npx ovsx publish codex-notes.vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix
          path: vscode/codex-notes.vsix
